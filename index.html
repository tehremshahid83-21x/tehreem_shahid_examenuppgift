<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1> Strawberry Matcha keyboard</h1>
    
       <div class="keyboard">
        <div class="row">
        <div class="key">ESC</div>
        <div class="key">F1</div>
        <div class="key">F2</div>
        <div class="key">F3</div>
        <div class="key">F4</div>
        <div class="key">F5</div>
        <div class="key">F6</div>
        <div class="key">F7</div>
        <div class="key">F8</div>
        <div class="key">F9</div>
        <div class="key">F10</div>
        <div class="key">F11</div>
        <div class="key">F12</div>
        <div class="key">Del</div>
        </div>
        <div class="row"> 
        <div class="key">Home</div>
        <div class="key">PgUp</div>
        <div class="key">End</div>
        </div>

         <div class="row">
            <div class="key" id="1">1</div>
            <div class="key" id="2">2</div>
            <div class="key" id="3">3</div>
            <div class="key" id="4">4</div>
            <div class="key" id="5">5</div>
            <div class="key" id="6">6</div>
            <div class="key" id="7">7</div>
            <div class="key" id="8">8</div>
            <div class="key" id="9">9</div>
            <div class="key" id="0">0</div>
           <div class="key">Backspace</div>
         </div>

         <div class="row">
        <div class="key wide">Tab</div>
        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
        <div class="key">Å</div>
       </div>

         <div class="row"> 
        <div class="key wide">Caps</div>
        <div class="key">A</div>
        <div class="key">S</div>
        <div class="key">D</div>
        <div class="key">F</div>
        <div class="key">G</div>
        <div class="key">H</div>
        <div class="key">J</div>
        <div class="key">K</div>
        <div class="key">L</div>
        <div class="key">Ö</div>
        <div class="key">Ä</div>
        <div class="key wide">Enter</div>
         </div>

         <div class="row"> 
          <div class="key wide" >Shift</div>
          <div class="key">Z</div>
          <div class="key">X</div>
          <div class="key">C</div>
          <div class="key">V</div>
          <div class="key">B</div>
          <div class="key">N</div>
          <div class="key">M</div>
        <div class="keywide">Shift</div>
         
         

            
       
         
        <div class="key small">Ctrl</div>
        <div class="key small" >Alt</div>
        <div class="space">SPACE</div>
        <div class="key small">↑</div>
        <div class="key small">←</div> 
      <div class="key small">←</div>
      <div class="key small">↓</div>
      <div class="key small">→</div>
    </div>
    


</div>

 <audio id="fil" src="fil/click.mp3.mp3"></audio>
    <script src="js/script.js"></script>

    
</body>   
</html>
